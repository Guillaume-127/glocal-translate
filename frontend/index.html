<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glocal Translate</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
                <h1>Glocal Translate</h1>
            </div>
            <div class="status-indicator">
                <span id="status-dot" class="dot connected"></span>
                <span id="status-text">Prêt</span>
            </div>
        </header>

        <main class="translation-board">
            <!-- Source Panel -->
            <div class="panel source-panel">
                <div class="panel-header">
                    <select id="source-lang" class="lang-select">
                        <option value="Français" selected>Français</option>
                        <option value="English">Anglais</option>
                    </select>
                </div>
                <div class="text-area-wrapper">
                    <textarea id="source-text" placeholder="Saisissez du texte ici..."></textarea>
                    
                    <!-- Suggestion Bubble -->
                    <div id="suggestion-box" class="suggestion-box hidden">
                        <span class="suggestion-tag">Suggestion</span>
                        <span id="suggestion-text">...</span>
                        <button id="accept-suggestion-btn" title="Accepter la suggestion (Tab)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </div>
                </div>
                <div class="panel-footer">
                    <span id="char-count">0 / 5000</span>
                </div>
            </div>

            <!-- Swap Button -->
            <button id="swap-lang-btn" class="swap-btn" title="Inverser les langues">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>
            </button>

            <!-- Target Panel -->
            <div class="panel target-panel">
                <div class="panel-header">
                    <select id="target-lang" class="lang-select">
                        <option value="Français">Français</option>
                        <option value="English" selected>Anglais</option>
                    </select>
                </div>
                <div class="text-area-wrapper">
                    <textarea id="target-text" readonly placeholder="La traduction apparaîtra ici..."></textarea>
                    <div id="loading-overlay" class="loading-overlay hidden">
                        <div class="spinner"></div>
                    </div>
                </div>
                <div class="panel-footer right-align">
                    <button id="copy-btn" class="icon-btn" title="Copier la traduction">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
